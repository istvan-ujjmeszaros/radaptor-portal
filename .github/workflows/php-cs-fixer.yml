name: PHP CS Fixer

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install PHP CS Fixer
        run: composer global require --no-interaction --no-progress friendsofphp/php-cs-fixer:^3.94

      - name: Expose Composer global bin
        run: echo "$(composer global config home --absolute)/vendor/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php
