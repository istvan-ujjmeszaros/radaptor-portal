name: Repo Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repo-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        if: ${{ hashFiles('.php-cs-fixer.php') != '' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install PHP CS Fixer
        if: ${{ hashFiles('.php-cs-fixer.php') != '' }}
        run: composer global require --no-interaction --no-progress friendsofphp/php-cs-fixer:^3.94

      - name: Expose Composer global bin
        if: ${{ hashFiles('.php-cs-fixer.php') != '' }}
        run: echo "$(composer global config home --absolute)/vendor/bin" >> "$GITHUB_PATH"

      - name: Configure Git hooks path
        shell: bash
        run: git config core.hooksPath .githooks

      - name: Run repo checks
        shell: bash
        run: bash ./bin/check-repo-baseline.sh

      - name: Install Git hooks
        shell: bash
        run: ./.githooks/install.sh
