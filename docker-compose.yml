services:
  portal:
    build: .
    ports:
      - "8020:80"
    volumes:
      # Mount only directories that need hot-reload during development
      # CSS is compiled during build and stored in image
      - ./src:/var/www/html/src
      - ./data:/var/www/html/data
      - ./public/index.php:/var/www/html/public/index.php
      - ./public/.htaccess:/var/www/html/public/.htaccess
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
